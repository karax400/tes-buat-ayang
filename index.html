<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>CBT TPA Offline (200 Soal)</title>
<style>
body{
  font-family:Arial;
  background: linear-gradient(-45deg, #1e3a8a, #9333ea, #06b6d4, #22c55e);
  background-size: 400% 400%;
  animation: gradient 12s ease infinite;
  color:#e5e7eb;
}

@keyframes gradient{
  0%{background-position:0% 50%;}
  50%{background-position:100% 50%;}
  100%{background-position:0% 50%;}
}

body::before{
  content:'';
  position:fixed;
  top:0; left:0;
  width:100%; height:100%;
  background:rgba(0,0,0,0.6);
  z-index:-1;
}

.container{
  max-width:1000px;
  margin:auto;
  padding:20px;
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(12px);
  border-radius: 16px;
  box-shadow: 0 0 20px rgba(0,0,0,0.4);
}

.question{display:none;margin-top:20px}

button{
  padding:8px 12px;
  margin:4px;
  border:none;
  border-radius:6px;
  cursor:pointer;
  transition:0.2s;
}

button:hover{
  transform: scale(1.05);
  opacity:0.9;
}

.nav button{margin:2px;background:#1f2937;color:white}
.submit{background:#3b82f6;color:white}
.timer{color:#f87171;font-size:18px}
</style>
</head>
<body>
<div class="container">
<h2>CBT TPA Pascasarjana (200 Soal Bank)</h2>
<p class="timer">Waktu: <span id="time">90:00</span></p>
<div id="nav"></div>
<form id="quiz"></form>
<button class="submit" onclick="finish()">Selesai</button>
<p id="result"></p>
</div>

<script>
// === GENERATE BANK SOAL TPA ===
const bank = [];

// VERBAL
const sinonim = [
["abstrak","tidak nyata"],["konkret","nyata"],["efisien","tepat guna"],["ambigu","ganda"]
];
for(let i=0;i<70;i++){
 let s=sinonim[i%sinonim.length];
 bank.push({
  q:`Sinonim dari "${s[0]}" adalah...`,
  options:[s[1],"tidak jelas","rumit","berbeda"],
  answer:"A"
 });
}

// KUANTITATIF
for(let i=1;i<=70;i++){
 let a=i+2,b=i*2;
 bank.push({
  q:`Jika x=${a}, y=${b}, maka x+y=?`,
  options:[`${a+b}`,`${a*b}`,`${b-a}`,`${a}`],
  answer:"A"
 });
}

// LOGIKA
for(let i=0;i<60;i++){
 bank.push({
  q:`Semua A adalah B. Semua B adalah C. Maka...`,
  options:["Semua A adalah C","Sebagian C adalah A","Tidak dapat disimpulkan","Semua C adalah A"],
  answer:"A"
 });
}

// === RANDOM 100 SOAL ===
let questions = bank.sort(()=>0.5-Math.random()).slice(0,100);

const quiz=document.getElementById('quiz');
const nav=document.getElementById('nav');

questions.forEach((item,i)=>{
 let div=document.createElement('div');
 div.className='question';
 div.id='q'+i;
 div.innerHTML=`<p>${i+1}. ${item.q}</p>`+
 item.options.map((opt,idx)=>{
  let label=String.fromCharCode(65+idx);
  return `<label><input type='radio' name='q${i}' value='${label}'> ${label}. ${opt}</label><br>`;
 }).join('');
 quiz.appendChild(div);

 let btn=document.createElement('button');
 btn.textContent=i+1;
 btn.onclick=(e)=>{e.preventDefault();show(i)};
 nav.appendChild(btn);
});

function show(i){
 document.querySelectorAll('.question').forEach(q=>q.style.display='none');
 document.getElementById('q'+i).style.display='block';
}
show(0);

function finish(){
 let score=0;
 questions.forEach((q,i)=>{
  let ans=document.querySelector(`input[name=q${i}]:checked`);
  if(ans && ans.value===q.answer) score++;
 });
 let tpaScore = Math.round((score/questions.length)*800);
 document.getElementById('result').innerText=`Benar: ${score}/${questions.length} | Skor TPA: ${tpaScore}`;
}

// TIMER 90 MENIT
let time=5400;
setInterval(()=>{
 if(time>0){
  time--;
  let m=Math.floor(time/60),s=time%60;
  document.getElementById('time').innerText=`${m}:${s<10?'0'+s:s}`;
 } else finish();
},1000);
</script>
</body>
</html>
